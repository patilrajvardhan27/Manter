services:
  - type: web
    name: manter-api
    runtime: node
    buildCommand: cd server && npm install && npm run db:generate && npm run build
    startCommand: node server/dist/server/src/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: manter-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: manter-redis
          type: redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: PORT
        value: 10000

databases:
  - name: manter-db
    databaseName: manter
    user: manter

  - name: manter-redis
    type: redis
